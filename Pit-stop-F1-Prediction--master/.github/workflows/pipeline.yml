name: Pit Stop MLOps Pipeline

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  validate-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install joblib fastf1 httpx pandas scikit-learn

      - name: Run System Validation (Smoke Test)
        env:
          NEXT_PUBLIC_OPENWEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python tests/check_system.py

      - name: Update Data and Re-train Model
        run: python scripts/update_engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/processed/*.json models/*.joblib
          git commit -m "Auto-update: Data & ML Models [skip ci]" || echo "No changes to commit"
          git push
